<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đọc Hóa Đơn → Excel</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=IBM+Plex+Sans:wght@300;400;600&display=swap');
  :root { --bg:#0f1117;--surface:#1a1d27;--border:#2a2d3a;--accent:#00e5a0;--text:#e8eaf0;--muted:#6b7080;--danger:#ff4757; }
  * { box-sizing:border-box;margin:0;padding:0; }
  body { background:var(--bg);color:var(--text);font-family:'IBM Plex Sans',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:40px 16px; }
  header { text-align:center;margin-bottom:36px; }
  header h1 { font-family:'IBM Plex Mono',monospace;font-size:clamp(1.4rem,4vw,2rem);font-weight:700;color:var(--accent); }
  header h1 span { color:var(--text); }
  header p { margin-top:8px;color:var(--muted);font-size:0.8rem;font-family:'IBM Plex Mono',monospace; }
  .container { width:100%;max-width:960px;display:flex;flex-direction:column;gap:20px; }
  .dropzone { border:2px dashed var(--border);border-radius:12px;padding:48px 24px;text-align:center;cursor:pointer;background:var(--surface);transition:border-color .2s,background .2s;position:relative; }
  .dropzone:hover,.dropzone.drag { border-color:var(--accent);background:#1e2230; }
  .dropzone input { position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%; }
  .dropzone-icon { font-size:2.5rem;margin-bottom:12px; }
  .dropzone p { color:var(--muted);font-size:.9rem; }
  .dropzone p strong { color:var(--accent); }
  #preview-wrap { display:none;border-radius:12px;overflow:hidden;border:1px solid var(--border); }
  #preview-img { width:100%;max-height:300px;object-fit:contain;background:#111;display:block; }
  .actions { display:flex;gap:12px;flex-wrap:wrap; }
  .btn { display:inline-flex;align-items:center;gap:8px;padding:12px 24px;border-radius:8px;border:none;cursor:pointer;font-family:'IBM Plex Mono',monospace;font-size:.9rem;font-weight:700;transition:opacity .2s,transform .1s; }
  .btn:active { transform:scale(.97); }
  .btn-primary { background:var(--accent);color:#000; }
  .btn-primary:disabled { opacity:.35;cursor:not-allowed; }
  .btn-excel { background:#1d6f42;color:#fff; }
  #status { font-family:'IBM Plex Mono',monospace;font-size:.8rem;min-height:20px; }
  #status.loading { color:var(--accent); } #status.error { color:var(--danger); } #status.done { color:var(--accent); }
  .table-card { display:none;border-radius:12px;border:1px solid var(--border);overflow:hidden; }
  .table-topbar { background:var(--surface);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border); }
  .table-topbar h2 { font-family:'IBM Plex Mono',monospace;font-size:.85rem;color:var(--accent);letter-spacing:1px;text-transform:uppercase; }
  .meta-grid { display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;padding:16px 20px;background:#12151f;border-bottom:1px solid var(--border); }
  .meta-item label { font-family:'IBM Plex Mono',monospace;font-size:.7rem;color:var(--muted);letter-spacing:1px;text-transform:uppercase;display:block;margin-bottom:4px; }
  .meta-item input { background:#1a1d27;border:1px solid var(--border);color:var(--text);font-size:.85rem;padding:6px 10px;border-radius:6px;width:100%;outline:none;transition:border-color .15s; }
  .meta-item input:focus { border-color:var(--accent); }
  .tag { display:inline-block;padding:2px 8px;border-radius:4px;font-family:'IBM Plex Mono',monospace;font-size:.7rem;background:#1a2a1a;color:var(--accent);border:1px solid #2a4a2a;margin-left:8px; }
  table { width:100%;border-collapse:collapse;font-size:.875rem; }
  thead th { background:#12151f;padding:11px 12px;text-align:left;font-family:'IBM Plex Mono',monospace;font-size:.7rem;color:var(--muted);letter-spacing:1px;text-transform:uppercase;border-bottom:1px solid var(--border);white-space:nowrap; }
  thead th.r { text-align:right; }
  tbody tr { border-bottom:1px solid var(--border);transition:background .15s; }
  tbody tr:hover { background:#1e2230; }
  tbody td { padding:9px 12px;vertical-align:middle; }
  td input { background:transparent;border:none;color:var(--text);font-family:inherit;font-size:inherit;width:100%;outline:none;padding:2px 4px;border-radius:4px;transition:background .15s; }
  td input:focus { background:#2a2d3a; }
  .total-row { border-top:2px solid var(--accent)!important;background:#12151f; }
  .total-row td { font-family:'IBM Plex Mono',monospace;font-weight:700;color:var(--accent);padding:13px 12px; }
  .del-btn { background:none;border:none;color:var(--muted);cursor:pointer;font-size:1rem;padding:2px 6px;border-radius:4px;transition:color .15s; }
  .del-btn:hover { color:var(--danger); }
  .add-row-btn { width:100%;padding:10px 20px;background:var(--surface);border:none;border-top:1px solid var(--border);color:var(--muted);cursor:pointer;font-family:'IBM Plex Mono',monospace;font-size:.8rem;text-align:left;transition:color .2s,background .2s; }
  .add-row-btn:hover { color:var(--accent);background:#1e2230; }
  .spinner { display:inline-block;width:13px;height:13px;border:2px solid transparent;border-top-color:currentColor;border-radius:50%;animation:spin .7s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  @media(max-width:600px) { .actions { flex-direction:column; } .btn { justify-content:center; } }
</style>
</head>
<body>
<header>
  <h1><span>HOÁ ĐƠN</span> → EXCEL</h1>
  <p>// Upload ảnh · AI đọc · Xuất Excel</p>
</header>
<div class="container">
  <div class="dropzone" id="dropzone">
    <input type="file" id="fileInput" accept="image/*">
    <div class="dropzone-icon">📄</div>
    <p><strong>Chọn ảnh hoặc kéo thả vào đây</strong></p>
    <p>Hỗ trợ JPG, PNG, HEIC</p>
  </div>
  <div id="preview-wrap"><img id="preview-img" src="" alt="preview"></div>
  <div class="actions">
    <button class="btn btn-primary" id="analyzeBtn" disabled onclick="analyze()">🔍 Đọc hóa đơn bằng AI</button>
    <button class="btn btn-excel" id="exportBtn" style="display:none" onclick="exportExcel()">📊 Xuất Excel</button>
  </div>
  <div id="status"></div>
  <div class="table-card" id="tableCard">
    <div class="table-topbar">
      <h2>Bảng hóa đơn <span class="tag" id="rowCount">0 dòng</span></h2>
      <span style="font-family:monospace;font-size:.72rem;color:var(--muted)">Click ô để chỉnh sửa</span>
    </div>
    <div class="meta-grid" id="metaGrid"></div>
    <div style="overflow-x:auto">
      <table>
        <thead>
          <tr>
            <th style="width:40px">STT</th><th>Tên mặt hàng</th><th style="width:70px">ĐVT</th>
            <th class="r" style="width:80px">SL</th><th class="r" style="width:130px">Đơn giá (đ)</th>
            <th class="r" style="width:140px">Thành tiền (đ)</th><th style="width:36px"></th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
        <tfoot id="tfoot"></tfoot>
      </table>
    </div>
    <button class="add-row-btn" onclick="addRow()">＋ Thêm dòng</button>
  </div>
</div>
<script>
let imgB64 = null;
document.getElementById('fileInput').addEventListener('change', e => { if(e.target.files[0]) loadFile(e.target.files[0]); });
const dz = document.getElementById('dropzone');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag'); });
dz.addEventListener('dragleave', () => dz.classList.remove('drag'));
dz.addEventListener('drop', e => { e.preventDefault(); dz.classList.remove('drag'); if(e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]); });

function loadFile(file) {
  const reader = new FileReader();
  reader.onload = ev => {
    const src = ev.target.result;
    imgB64 = src.split(',')[1];
    document.getElementById('preview-img').src = src;
    document.getElementById('preview-wrap').style.display = 'block';
    document.getElementById('analyzeBtn').disabled = false;
    setStatus('');
  };
  reader.readAsDataURL(file);
}

function setStatus(msg, type='') { const el=document.getElementById('status'); el.textContent=msg; el.className=type; }

async function analyze() {
  if(!imgB64) return;
  const btn = document.getElementById('analyzeBtn');
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Đang đọc...';
  setStatus('// Đang gửi ảnh đến AI...','loading');
  try {
    const res = await fetch('/api/analyze', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({imageBase64:imgB64}) });
    if(!res.ok) { const e=await res.json(); throw new Error(e.error||'Server error'); }
    const d = await res.json();
    renderMeta(d); renderTable(d.items||[]);
    setStatus(`// OK · ${(d.items||[]).length} sản phẩm`,'done');
    document.getElementById('exportBtn').style.display='inline-flex';
  } catch(err) { setStatus('// Lỗi: '+err.message,'error'); }
  btn.disabled=false; btn.innerHTML='🔍 Đọc lại';
}

function renderMeta(d) {
  const fields=[
    {key:'supplier',label:'🏪 Cửa hàng'},{key:'address',label:'📍 Địa chỉ'},
    {key:'phone',label:'📞 ĐT cửa hàng'},{key:'customer',label:'👤 Khách hàng'},
    {key:'customer_phone',label:'📱 ĐT khách'},{key:'date',label:'📅 Ngày'},
    {key:'invoice_number',label:'🔢 Số HĐ'},
  ];
  document.getElementById('metaGrid').innerHTML = fields.map(f =>
    `<div class="meta-item"><label>${f.label}</label><input id="meta_${f.key}" value="${escHtml(d[f.key]||'')}"></div>`
  ).join('');
}

function renderTable(items) {
  document.getElementById('tbody').innerHTML='';
  items.forEach((it,i) => appendRow(i+1,it));
  updateRowCount(); renderTotal();
  document.getElementById('tableCard').style.display='block';
}

function appendRow(idx, it={}) {
  const tr=document.createElement('tr');
  tr.innerHTML=`
    <td style="color:var(--muted);font-family:monospace;font-size:.8rem;text-align:center">${idx}</td>
    <td><input value="${escHtml(it.name||'')}" oninput="recalc(this.closest('tr'))"></td>
    <td><input value="${escHtml(it.unit||'cái')}" style="width:60px;text-align:center"></td>
    <td><input type="number" value="${it.quantity||1}" style="width:70px;text-align:right" oninput="recalc(this.closest('tr'))"></td>
    <td><input type="number" value="${it.unit_price||0}" style="width:120px;text-align:right" oninput="recalc(this.closest('tr'))"></td>
    <td style="text-align:right;font-family:monospace" class="tcell">${fmt(it.total||0)}</td>
    <td><button class="del-btn" onclick="deleteRow(this)">✕</button></td>`;
  document.getElementById('tbody').appendChild(tr);
}

function addRow() { appendRow(document.querySelectorAll('#tbody tr').length+1); updateRowCount(); renderTotal(); }
function deleteRow(btn) { btn.closest('tr').remove(); renumber(); renderTotal(); updateRowCount(); }
function renumber() { document.querySelectorAll('#tbody tr').forEach((tr,i) => { tr.cells[0].textContent=i+1; }); }
function recalc(tr) {
  const qty=parseFloat(tr.cells[3].querySelector('input').value)||0;
  const price=parseFloat(tr.cells[4].querySelector('input').value)||0;
  tr.cells[5].textContent=fmt(qty*price); renderTotal();
}
function renderTotal() {
  let sum=0;
  document.querySelectorAll('#tbody tr').forEach(tr => { sum+=unFmt(tr.cells[5].textContent); });
  document.getElementById('tfoot').innerHTML=`<tr class="total-row"><td colspan="5" style="text-align:right;font-size:.8rem;letter-spacing:1px">TỔNG CỘNG</td><td style="text-align:right;font-size:1rem">${fmt(sum)}</td><td></td></tr>`;
}
function updateRowCount() { document.getElementById('rowCount').textContent=document.querySelectorAll('#tbody tr').length+' dòng'; }
function getMeta(k) { const el=document.getElementById('meta_'+k); return el?el.value:''; }

async function exportExcel() {
  const workbook = new ExcelJS.Workbook();
  const ws = workbook.addWorksheet('Hóa Đơn');

  // Column widths
  ws.columns = [
    { width: 6 }, { width: 36 }, { width: 8 },
    { width: 10 }, { width: 16 }, { width: 16 }
  ];

  const thinBorder = { style: 'thin', color: { argb: 'FF000000' } };
  const medBorder  = { style: 'medium', color: { argb: 'FF000000' } };
  const allThin = { top: thinBorder, bottom: thinBorder, left: thinBorder, right: thinBorder };
  const allMed  = { top: medBorder,  bottom: medBorder,  left: medBorder,  right: medBorder };

  // ── ROW 1: Tên cửa hàng ──
  ws.mergeCells('A1:F1');
  const r1 = ws.getCell('A1');
  r1.value = getMeta('supplier') || 'CỬA HÀNG';
  r1.font = { bold: true, size: 14 };
  r1.alignment = { horizontal: 'center', vertical: 'middle' };

  // ── ROW 2: Địa chỉ ──
  ws.mergeCells('A2:F2');
  const r2 = ws.getCell('A2');
  r2.value = getMeta('address') || '';
  r2.alignment = { horizontal: 'center' };

  // ── ROW 3: ĐT ──
  ws.mergeCells('A3:F3');
  const r3 = ws.getCell('A3');
  r3.value = 'ĐT: ' + (getMeta('phone') || '');
  r3.alignment = { horizontal: 'center' };

  // ── ROW 4: blank ──

  // ── ROW 5: ĐƠN HÀNG ──
  ws.mergeCells('A5:F5');
  const r5 = ws.getCell('A5');
  r5.value = 'ĐƠN HÀNG';
  r5.font = { bold: true, size: 16 };
  r5.alignment = { horizontal: 'center', vertical: 'middle' };
  ws.getRow(5).height = 28;

  // ── ROW 6: Ngày | Số HĐ ──
  ws.mergeCells('A6:C6');
  ws.getCell('A6').value = 'Ngày: ' + (getMeta('date') || '');
  ws.getCell('A6').font = { bold: true };
  ws.mergeCells('D6:F6');
  ws.getCell('D6').value = 'Số: ' + (getMeta('invoice_number') || '');
  ws.getCell('D6').font = { bold: true };

  // ── ROW 7: Khách hàng | ĐT khách ──
  ws.mergeCells('A7:C7');
  ws.getCell('A7').value = 'Khách hàng: ' + (getMeta('customer') || '');
  ws.getCell('A7').font = { bold: true };
  ws.mergeCells('D7:F7');
  ws.getCell('D7').value = 'Điện thoại: ' + (getMeta('customer_phone') || '');
  ws.getCell('D7').font = { bold: true };

  // ── ROW 8: blank ──

  // ── ROW 9: Header bảng ──
  const headers = ['STT', 'Mặt hàng', 'ĐVT', 'Số lượng', 'Đơn giá', 'Thành tiền'];
  const hRow = ws.getRow(9);
  hRow.height = 22;
  headers.forEach((h, i) => {
    const cell = hRow.getCell(i + 1);
    cell.value = h;
    cell.font = { bold: true };
    cell.alignment = { horizontal: 'center', vertical: 'middle', wrapText: true };
    cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFD9E1F2' } };
    cell.border = allMed;
  });

  // ── ROW 10+: Data ──
  const dataRows = [];
  document.querySelectorAll('#tbody tr').forEach((tr, i) => {
    const inputs = tr.querySelectorAll('input');
    dataRows.push({
      stt: i + 1,
      name: inputs[0].value,
      unit: inputs[1].value,
      qty: parseFloat(inputs[2].value) || 0,
      price: parseFloat(inputs[3].value) || 0,
      total: unFmt(tr.cells[5].textContent),
    });
  });

  let grandTotal = 0;
  dataRows.forEach((d, i) => {
    const rowNum = 10 + i;
    const row = ws.getRow(rowNum);
    const isEven = i % 2 === 1;
    const fillColor = isEven ? 'FFF2F2F2' : 'FFFFFFFF';

    const vals = [d.stt, d.name, d.unit, d.qty, d.price, d.total];
    vals.forEach((v, c) => {
      const cell = row.getCell(c + 1);
      cell.value = v;
      cell.border = allThin;
      cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: fillColor } };
      if (c === 0) cell.alignment = { horizontal: 'center' };
      else if (c >= 3) { cell.alignment = { horizontal: 'right' }; cell.numFmt = '#,##0'; }
    });
    grandTotal += d.total;
  });

  // ── TỔNG CỘNG ──
  const totalRowNum = 10 + dataRows.length;
  const totalRow = ws.getRow(totalRowNum);

  [1,2,3,4].forEach(c => {
    const cell = totalRow.getCell(c);
    cell.value = '';
    cell.border = allThin;
    cell.fill = { type:'pattern', pattern:'solid', fgColor:{ argb:'FFD9E1F2' } };
  });

  const tcLabel = totalRow.getCell(5);
  tcLabel.value = 'TỔNG CỘNG';
  tcLabel.font = { bold: true };
  tcLabel.alignment = { horizontal: 'right' };
  tcLabel.border = allThin;
  tcLabel.fill = { type:'pattern', pattern:'solid', fgColor:{ argb:'FFD9E1F2' } };

  const tcVal = totalRow.getCell(6);
  tcVal.value = grandTotal;
  tcVal.numFmt = '#,##0';
  tcVal.font = { bold: true, color: { argb: 'FFC00000' } };
  tcVal.alignment = { horizontal: 'right' };
  tcVal.border = allThin;
  tcVal.fill = { type:'pattern', pattern:'solid', fgColor:{ argb:'FFD9E1F2' } };

  // ── DƯ NỢ ──
  const debtRowNum = totalRowNum + 1;
  const debtRow = ws.getRow(debtRowNum);
  [1,2,3,4].forEach(c => {
    debtRow.getCell(c).value = '';
    debtRow.getCell(c).border = allThin;
  });
  const dLabel = debtRow.getCell(5);
  dLabel.value = 'Dư nợ:';
  dLabel.font = { bold: true };
  dLabel.alignment = { horizontal: 'right' };
  dLabel.border = allThin;
  const dVal = debtRow.getCell(6);
  dVal.value = 0;
  dVal.numFmt = '#,##0';
  dVal.font = { bold: true };
  dVal.alignment = { horizontal: 'right' };
  dVal.border = allThin;

  // ── CHỮ KÝ ──
  const sigR = debtRowNum + 2;
  ws.mergeCells(`A${sigR}:C${sigR}`);
  ws.getCell(`A${sigR}`).value = 'Người lập biểu';
  ws.getCell(`A${sigR}`).font = { bold: true };
  ws.getCell(`A${sigR}`).alignment = { horizontal: 'center' };

  ws.mergeCells(`D${sigR}:F${sigR}`);
  ws.getCell(`D${sigR}`).value = 'Đại diện bên bán';
  ws.getCell(`D${sigR}`).font = { bold: true };
  ws.getCell(`D${sigR}`).alignment = { horizontal: 'center' };

  ws.mergeCells(`A${sigR+1}:C${sigR+1}`);
  ws.getCell(`A${sigR+1}`).value = '(Ký, họ tên)';
  ws.getCell(`A${sigR+1}`).font = { italic: true };
  ws.getCell(`A${sigR+1}`).alignment = { horizontal: 'center' };

  ws.mergeCells(`D${sigR+1}:F${sigR+1}`);
  ws.getCell(`D${sigR+1}`).value = '(Ký, họ tên)';
  ws.getCell(`D${sigR+1}`).font = { italic: true };
  ws.getCell(`D${sigR+1}`).alignment = { horizontal: 'center' };

  // ── Export ──
  const buf = await workbook.xlsx.writeBuffer();
  const blob = new Blob([buf], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `hoadon_${new Date().toISOString().slice(0,10)}.xlsx`;
  a.click();
  URL.revokeObjectURL(url);
}

function fmt(n)     { return Number(n||0).toLocaleString('vi-VN'); }
function unFmt(s)   { return parseInt(String(s).replace(/[^0-9]/g,''))||0; }
function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }
</script>
</body>
</html>
